agents:
  defaults:
    workspace: ~/.nanobot/workspace
    model: deepseek-v4-flash
    provider: deepseek
    maxTokens: 8192
    temperature: 0.1
    maxToolIterations: 40
    memoryWindow: 100

channels:
  console:
    enabled: true
    botName: nanobot
    allowFrom:
      - "*"
  sendProgress: true
  sendToolHints: false
  telegram:
    enabled: false
    token: ""
    allowFrom: []
  discord:
    enabled: false
    token: ""
    allowFrom: []
  whatsapp:
    enabled: false
    bridgeUrl: ws://localhost:3001
    bridgeToken: ""
    allowFrom: []
  feishu:
    enabled: false
    appId: ""
    appSecret: ""
    allowFrom: []
  dingtalk:
    enabled: false
    clientId: ""
    clientSecret: ""
    allowFrom: []
  email:
    enabled: false
    imapHost: ""
    smtpHost: ""
    allowFrom: []
  slack:
    enabled: false
    botToken: ""
    allowFrom: []
  qq:
    enabled: false
    appId: ""
    secret: ""
    allowFrom: []
  matrix:
    enabled: false
    homeserver: https://matrix.org
    accessToken: ""
    allowFrom: []
  mochat:
    enabled: false
    baseUrl: https://mochat.io
    allowFrom: []

providers:
  anthropic:
    apiKey: ""
  openai:
    apiKey: ""
  openrouter:
    apiKey: ""
  deepseek:
    apiKey: ""
    apiBase: "https://api.deepseek.com/v1"
  gemini:
    apiKey: ""
  zhipu:
    apiKey: ""
  dashscope:
    apiKey: ""
  moonshot:
    apiKey: ""
  minimax:
    apiKey: ""
  groq:
    apiKey: ""
  custom:
    apiKey: ""
  azure_openai:
    apiKey: ""
  aihubmix:
    apiKey: ""
  siliconflow:
    apiKey: ""
  volcengine:
    apiKey: ""
  vllm:
    apiKey: ""

gateway:
  host: 0.0.0.0
  port: 18790

tools:
  web:
    apiKey: ""
    proxy: null
  exec:
    timeout: 60
    pathAppend: ""
  restrictToWorkspace: false